elasticsearch:
  host: "localhost"
  port: 9200
  scheme: "http"
  username: ""
  password: ""

database:
  engine: "sqlite"
  path: "rag.db"
  host: "localhost"
  port: 3306
  username: ""
  password: ""

models:
  embedding_model:
    bge-small-zh-v1.5:
      hf_url: "https://huggingface.co/BAAI/bge-small-zh-v1.5"
      local_url: "/root/autodl-tmp/04-government-advanced-rag/hf-models/bge-small-zh-v1.5/"
      dims: 512
    
  rerank_model:
    bge-reranker-base:
      hf_url: "https://huggingface.co/BAAI/bge-reranker-base"
      local_url: "/root/autodl-tmp/04-government-advanced-rag/hf-models/bge-reranker-base/"
    
  llm:
    config:
      temperature: 0.1
      top_p: 1
      max_tokens_to_sample: 1024
    base_model:
      glm:
        tokens: ""
      qwen:
        tokens: ""
      gpt:
        tokens: ""



device: "cuda"



rag:
  llm_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  llm_api_key: "xxxxxx"
  llm_model: "qwen3.5-plus" #注意小写
  embedding_model: "bge-small-zh-v1.5"
  rerank_model: "bge-reranker-base"
  chunk_size: 256
  chunk_overlap: 20
  chunk_candidate: 10
  use_embedding: true
  use_rerank: true
  use_rrf: true
  port: 6006
